<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        #terminal { height: 100%;}
    </style>
</head>
<body>
<div id="terminal"></div>
<script>
    const params = new URLSearchParams(window.location.search);
    const fontSize = parseInt(params.get('fontSize')) || 14;
    const isDark = params.get('theme') !== 'light';

    const darkTheme = {
        background: '#0D1117',
        foreground: '#c9d1d9',
        cursor: '#c9d1d9',
        selection: '#264f78',
        black: '#484f58',
        red: '#ff7b72',
        green: '#3fb950',
        yellow: '#d29922',
        blue: '#58a6ff',
        magenta: '#bc8cff',
        cyan: '#39c5cf',
        white: '#b1bac4',
    };

    const lightTheme = {
        background: '#e8f1fb',
        foreground: '#1f2328',
        cursor: '#1f2328',
        selection: '#b0ceed',
        black: '#6e7781',
        red: '#cf222e',
        green: '#116329',
        yellow: '#9a6700',
        blue: '#185FA5',
        magenta: '#8250df',
        cyan: '#0550ae',
        white: '#6e7781',
    };

    document.body.style.background = isDark ? '#0D1117' : '#e8f1fb';

    var term = new Terminal({
        convertEol: true,
        fontSize: fontSize,
        fontFamily: 'JetBrains Mono, Cascadia Code, monospace',
        cursorBlink: false,
        cursorStyle: 'block',
        scrollback: 1000,
        disableStdin: true,
        theme: isDark ? darkTheme : lightTheme,
    });

    var fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));

    setTimeout(function() {
        fitAddon.fit();
        terminalBridge.setSize(term.cols, term.rows);
        terminalBridge.connect();
    }, 500);

    window.addEventListener('resize', function() {
        fitAddon.fit();
        terminalBridge.setSize(term.cols, term.rows);
    });

    window.addEventListener('wheel', function(e) {
        if (e.ctrlKey) {
            e.preventDefault();
            if (e.deltaY < 0) {
                term.options.fontSize = term.options.fontSize + 1;
            } else {
                term.options.fontSize = Math.max(8, term.options.fontSize - 1);
            }
            fitAddon.fit();
        }
    }, { passive: false });

    function setTheme(dark) {
        term.options.theme = dark ? darkTheme : lightTheme;
        document.body.style.background = dark ? '#0D1117' : '#e8f1fb';
    }

    function getSize() {
        fitAddon.fit();
        return term.cols + "," + term.rows;
    }
</script>
</body>
</html>
