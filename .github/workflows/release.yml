name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-x64
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish Snippy.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o ./publish

      - name: Zip (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: zip -r snippy-${{ matrix.rid }}.zip ./publish

      - name: Zip (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path ./publish/* -DestinationPath snippy-${{ matrix.rid }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: snippy-${{ matrix.rid }}.zip
